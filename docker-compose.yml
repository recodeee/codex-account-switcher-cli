services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.local
    environment:
      # Ensure --reload notices host bind-mount edits reliably across Docker setups.
      WATCHFILES_FORCE_POLLING: "true"
      # Allow containerized backend to inspect host Codex processes for live session mapping.
      CODEX_LB_PROC_ROOT: /host_proc
    ports:
      - "2455:2455"
    command:
      - sh
      - /app/scripts/run-server-dev.sh
    volumes:
      # Bind-mount backend source for instant FastAPI reload on Python edits.
      - ./app:/app/app:rw
      - ./scripts:/app/scripts:rw
      - ./logs:/var/log/codex-lb:rw
      - ${HOME}/.codex:/home/app/.codex:rw
      - /proc:/host_proc:ro
      - codex-lb-data:/var/lib/codex-lb
    develop:
      watch:
        - action: rebuild
          path: ./pyproject.toml
        - action: rebuild
          path: ./uv.lock
        - action: rebuild
          path: ./Dockerfile
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile_inline: |
        FROM oven/bun:1.3.7-alpine
        WORKDIR /app
        COPY package.json bun.lock ./
        RUN bun install --frozen-lockfile
        COPY . .
        CMD ["sh", "-c", "bun run sync-version && ./node_modules/.bin/next dev --port 5173 --hostname 0.0.0.0"]
    ports:
      - "5173:5173"
    env_file:
      - ./.env.local
    command:
      - sh
      - /app/scripts/run-frontend-dev.sh
    environment:
      API_PROXY_TARGET: http://server:2455
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "100"
    volumes:
      - ./frontend:/app:rw
      - ./logs:/var/log/codex-lb:rw
      - codex-lb-frontend-node-modules:/app/node_modules

  medusa-redis:
    image: redis:7-alpine
    profiles: ["medusa"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  medusa-backend:
    profiles: ["medusa"]
    build:
      context: ./backend/apps/backend
      dockerfile: Dockerfile
      args:
        NODE_ENV: development
    depends_on:
      medusa-redis:
        condition: service_healthy
    env_file:
      - ./.env.local
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 9000
      REDIS_URL: redis://medusa-redis:6379
      STORE_CORS: ${MEDUSA_STORE_CORS:-http://localhost:5173,http://127.0.0.1:5173}
      ADMIN_CORS: ${MEDUSA_ADMIN_CORS:-http://localhost:9000,http://127.0.0.1:9000}
      AUTH_CORS: ${MEDUSA_AUTH_CORS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:9000,http://127.0.0.1:9000}
      DATABASE_URL: ${MEDUSA_DATABASE_URL:-}
      SUPABASE_DB_URL: ${MEDUSA_SUPABASE_DB_URL:-}
      DB_SCHEMA: ${MEDUSA_DB_SCHEMA:-commerce}
      PGSSLMODE: ${MEDUSA_PGSSLMODE:-require}
      JWT_SECRET: ${MEDUSA_JWT_SECRET:-supersecret}
      COOKIE_SECRET: ${MEDUSA_COOKIE_SECRET:-supersecret}
    command:
      - sh
      - -c
      - pnpm dev
    ports:
      - "9000:9000"
    volumes:
      - ./backend/apps/backend:/app:rw
      - ./logs:/var/log/codex-lb:rw
      - codex-lb-medusa-node-modules:/app/node_modules
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_USER: codex_lb
      POSTGRES_PASSWORD: codex_lb
      POSTGRES_DB: codex_lb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codex_lb -d codex_lb"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - codex-lb-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  codex-lb-data:
    name: codex-lb-data
  codex-lb-postgres-data:
    name: codex-lb-postgres-data
  codex-lb-frontend-node-modules:
    name: codex-lb-frontend-node-modules
  codex-lb-medusa-node-modules:
    name: codex-lb-medusa-node-modules
